name: Build and publish Tauri release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  publish-tauri:
    permissions:
      contents: write

    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm install

      - name: Build and publish Tauri release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ startsWith(github.ref_name, 'v') && github.ref_name || format('v{0}', github.run_number) }}
          releaseName: Anotaí! ${{ startsWith(github.ref_name, 'v') && github.ref_name || format('v{0}', github.run_number) }}
          releaseBody: |
            Nova release do app desktop Anotaí!

            Gerada automaticamente pelo GitHub Actions.
          releaseDraft: true
          prerelease: false
